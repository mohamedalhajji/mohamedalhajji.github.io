<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Mohamed Al-Hajji - Game development projects." />
    <title>Mohamed Al-Hajji | Game Development</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="styles.css?v=20260515-2" />
</head>
<body>
    <header class="site-header">
        <a class="brand" href="index.html" aria-label="Mohamed Al-Hajji home">
            <span class="brand-mark">MA</span>
            <span>Mohamed Al-Hajji</span>
        </a>

        <button class="nav-toggle" type="button" aria-label="Open navigation" aria-expanded="false">
            <span></span>
            <span></span>
        </button>

        <nav class="site-nav" aria-label="Primary navigation">
            <a href="index.html">Home</a>
            <a href="projects.html">Projects</a>
            <a href="resume.html">CV</a>
            <a class="active" href="game-dev.html">Game Dev</a>
            <button class="theme-toggle" type="button" aria-label="Toggle light and dark mode">Light</button>
        </nav>
    </header>

    <main>
        <section class="hero game-hero">
            <div class="hero-inner">
                <div class="hero-copy reveal">
                    <h1>Game development work.</h1>
                    <div class="hero-actions">
                        <a class="button primary" href="#games">View games</a>
                    </div>
                </div>

                <aside class="hero-summary reveal" aria-label="Game development summary">
                    <dl>
                        <div>
                            <dt>Tools</dt>
                            <dd>Unreal Engine 5, Visual Blueprints, Figma</dd>
                        </div>
                        <div>
                            <dt>Focus</dt>
                            <dd>Gameplay, UI, interactions</dd>
                        </div>
                        <div>
                            <dt>Role</dt>
                            <dd>Separate creative track</dd>
                        </div>
                    </dl>
                </aside>
            </div>
        </section>

        <section id="games" class="section-block">
            <div class="section-header reveal">
                <p class="eyebrow">Game projects</p>
                <h2>Selected work</h2>
            </div>

            <div class="project-grid game-project-grid">
                <button class="project-tile game-tile reveal" type="button" data-game="gambasim">
                    <img src="assets/GS.png" alt="GambaSim game screenshot" />
                    <h3>GambaSim</h3>
                    <p>Casino simulation with progression, betting systems, and custom UI assets.</p>
                    <div class="tag-row">
                        <span>Simulation</span>
                        <span>Steam</span>
                    </div>
                </button>

                <button class="project-tile game-tile reveal" type="button" data-game="time-within">
                    <img src="assets/TTW.png" alt="The Time Within game screenshot" />
                    <h3>The Time Within</h3>
                    <p>First-person escape room with linked past and future puzzle rooms.</p>
                    <div class="tag-row">
                        <span>UE5</span>
                        <span>Blueprints</span>
                        <span>Puzzles</span>
                    </div>
                </button>

                <button class="project-tile game-tile reveal" type="button" data-game="cybers-edge">
                    <img src="assets/CE.png" alt="Cyber's Edge game screenshot" />
                    <h3>Cyber's Edge</h3>
                    <p>Arcade runner prototype focused on movement timing and replayability.</p>
                    <div class="tag-row">
                        <span>Runner</span>
                        <span>Arcade</span>
                        <span>Prototype</span>
                    </div>
                </button>
            </div>
        </section>
    </main>

    <div class="project-modal" hidden>
        <div class="modal-backdrop" data-close-modal></div>
        <article class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <button class="modal-close" type="button" aria-label="Close project details" data-close-modal>Close</button>
            <p class="eyebrow" id="modal-category"></p>
            <h2 id="modal-title"></h2>
            <p id="modal-summary"></p>
            <div class="modal-grid">
                <div>
                    <h3>Details</h3>
                    <ul id="modal-points"></ul>
                </div>
                <div>
                    <h3>Tags</h3>
                    <div class="tag-row" id="modal-tags"></div>
                    <a class="modal-link" id="modal-link" href="#" target="_blank" rel="noreferrer">Open link</a>
                </div>
            </div>
        </article>
    </div>

    <footer class="site-footer">
        <span>Mohamed Al-Hajji</span>
        <span>Game Development</span>
    </footer>

    <script src="script.js?v=20260515-2"></script>
</body>
</html>
